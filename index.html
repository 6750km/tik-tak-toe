<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .controls {
            margin-bottom: 20px;
            z-index: 10;
        }
        .game-container {
            position: relative;
            width: 310px;
            height: 310px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            border: 2px solid #333;
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            box-sizing: border-box;
        }
        .cell.taken {
            cursor: not-allowed;
        }
        /* Новая CSS-линия */
        .strike-line {
            position: absolute;
            background-color: #E91E63;
            border-radius: 4px;
            z-index: 5;
            display: none;
            transform-origin: left center;
            pointer-events: none;
        }
        .status {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 1.5em;
            z-index: 10;
        }
        .version {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #999;
            z-index: 10;
        }
        button, select {
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="controls">
    <label>
        Режим:
        <select id="mode">
            <option value="ai">Против робота (0)</option>
            <option value="pvp">Два игрока</option>
        </select>
    </label>
    <button id="reset">Сброс</button>
</div>

<div class="game-container">
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    <div id="strike" class="strike-line"></div>
</div>

<div class="status" id="status">Ход Х</div>
<div class="version">v3</div>

<script>
    const board = document.getElementById('board');
    const cells = document.querySelectorAll('.cell');
    const statusText = document.getElementById('status');
    const resetBtn = document.getElementById('reset');
    const modeSelect = document.getElementById('mode');
    const strike = document.getElementById('strike');

    let gameState = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let isGameActive = true;

    // Конфигурация линий для каждого выигрышного комбо внутри контейнера 310x310
    const winningConditions = [
        { combo: [0, 1, 2], style: { width: '290px', height: '8px', top: '46px', left: '10px', transform: 'none' } },
        { combo: [3, 4, 5], style: { width: '290px', height: '8px', top: '151px', left: '10px', transform: 'none' } },
        { combo: [6, 7, 8], style: { width: '290px', height: '8px', top: '256px', left: '10px', transform: 'none' } },
        
        { combo: [0, 3, 6], style: { width: '8px', height: '290px', top: '10px', left: '46px', transform: 'none' } },
        { combo: [1, 4, 7], style: { width: '8px', height: '290px', top: '10px', left: '151px', transform: 'none' } },
        { combo: [2, 5, 8], style: { width: '8px', height: '290px', top: '10px', left: '256px', transform: 'none' } },
        
        { combo: [0, 4, 8], style: { width: '395px', height: '8px', top: '10px', left: '10px', transform: 'rotate(45deg)' } },
        { combo: [2, 4, 6], style: { width: '395px', height: '8px', top: '10px', left: '300px', transform: 'rotate(135deg)' } }
    ];

    function handleCellClick(e) {
        const clickedCell = e.target;
        const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

        if (gameState[clickedCellIndex] !== "" || !isGameActive) return;

        makeMove(clickedCell, clickedCellIndex);

        if (isGameActive && modeSelect.value === 'ai' && currentPlayer === 'O') {
            board.style.pointerEvents = 'none';
            setTimeout(() => {
                aiMove();
                board.style.pointerEvents = 'auto';
            }, 400);
        }
    }

    function makeMove(cell, index) {
        gameState[index] = currentPlayer;
        cell.innerText = currentPlayer;
        cell.classList.add('taken');
        
        if (currentPlayer === 'X') {
            cell.style.color = '#2196F3';
        } else {
            cell.style.color = '#4CAF50';
        }

        checkResult();
    }

    function aiMove() {
        if (!isGameActive) return;

        const winMove = findBestMove('O');
        if (winMove !== null) { return executeAiMove(winMove); }

        if (Math.random() < 0.75) {
            const blockMove = findBestMove('X');
            if (blockMove !== null) { return executeAiMove(blockMove); }
        }

        if (gameState[4] === "") { return executeAiMove(4); }

        const corners = [0, 2, 6, 8].filter(idx => gameState[idx] === "");
        if (corners.length > 0 && Math.random() < 0.6) {
            const randomCorner = corners[Math.floor(Math.random() * corners.length)];
            return executeAiMove(randomCorner);
        }

        const emptyCells = gameState.reduce((acc, val, idx) => val === "" ? acc.concat(idx) : acc, []);
        if (emptyCells.length > 0) {
            const randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            executeAiMove(randomIndex);
        }
    }

    function executeAiMove(index) {
        makeMove(cells[index], index);
    }

    function findBestMove(player) {
        for (let cond of winningConditions) {
            const [a, b, c] = cond.combo;
            const values = [gameState[a], gameState[b], gameState[c]];
            if (values.filter(v => v === player).length === 2 && values.filter(v => v === "").length === 1) {
                if (gameState[a] === "") return a;
                if (gameState[b] === "") return b;
                if (gameState[c] === "") return c;
            }
        }
        return null;
    }

    function drawWinLine(conditionConfig) {
        const s = conditionConfig.style;
        strike.style.width = s.width;
        strike.style.height = s.height;
        strike.style.top = s.top;
        strike.style.left = s.left;
        strike.style.transform = s.transform;
        strike.style.display = 'block';
    }

    function checkResult() {
        let roundWon = false;
        let winningConfig = null;

        for (let i = 0; i < winningConditions.length; i++) {
            const [a, b, c] = winningConditions[i].combo;
            if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                roundWon = true;
                winningConfig = winningConditions[i];
                break;
            }
        }

        if (roundWon) {
            statusText.innerText = `Победил игрок ${currentPlayer}!`;
            isGameActive = false;
            drawWinLine(winningConfig);
            return;
        }

        if (!gameState.includes("")) {
            statusText.innerText = "Ничья!";
            isGameActive = false;
            return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";
        statusText.innerText = `Ход ${currentPlayer}`;
    }

    function restartGame() {
        gameState = ["", "", "", "", "", "", "", "", ""];
        currentPlayer = "X";
        isGameActive = true;
        statusText.innerText = `Ход ${currentPlayer}`;
        strike.style.display = 'none';
        cells.forEach(cell => {
            cell.innerText = "";
            cell.classList.remove('taken');
            cell.style.color = '#333';
        });
    }

    board.addEventListener('click', handleCellClick);
    resetBtn.addEventListener('click', restartGame);
    modeSelect.addEventListener('change', restartGame);
</script>

</body>
</html>
